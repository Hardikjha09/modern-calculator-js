<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h1>Calculator</h1>

    <!-- Display -->
    <div class="display" id="display">0</div>

    <!-- Buttons -->
    <div class="buttons">
      <button type="button" id="clear" aria-label="All Clear">AC</button>
      <button type="button" id="percent" aria-label="Percentage">%</button>
      <button type="button" id="backspace" aria-label="Backspace">←</button>
      <button type="button" id="divide" aria-label="Divide">/</button>

      <button type="button" id="seven">7</button>
      <button type="button" id="eight">8</button>
      <button type="button" id="nine">9</button>
      <button type="button" id="multiply" aria-label="Multiply">*</button>

      <button type="button" id="four">4</button>
      <button type="button" id="five">5</button>
      <button type="button" id="six">6</button>
      <button type="button" id="subtract" aria-label="Subtract">-</button>

      <button type="button" id="one">1</button>
      <button type="button" id="two">2</button>
      <button type="button" id="three">3</button>
      <button type="button" id="add" aria-label="Add">+</button>

      <button type="button" id="double-zero">00</button>
      <button type="button" id="zero">0</button>
      <button type="button" id="decimal">.</button>
      <button type="button" id="equals" aria-label="Equals">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
